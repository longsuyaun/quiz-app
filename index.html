            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });

    // 加载题库

        // 变式题生成器
        function generateVariants(original) {
            const variants = [];
            
            // 数字变式
            if (original.question.includes("12")) {
                const variant = JSON.parse(JSON.stringify(original));
                variant.question = original.question.replace("12", "20");
                variant.answer = original.answer === "C" ? "C" : original.answer;
                variant.isVariant = true;
                variants.push(variant);
            }
            
            // 问法变式
            if (original.question.includes("正确的是")) {
                const variant = JSON.parse(JSON.stringify(original));
                variant.question = original.question.replace("正确的是", "错误的是");
                variant.isVariant = true;
                variants.push(variant);
            }
            
            return variants;
        }
        
        // 合并题库（原始 + 变式）
        function getMergedQuestions() {
            const merged = JSON.parse(JSON.stringify(questionBank));
            
            if (isVariantMode) {
                for (let user in merged) {
                    for (let subject in merged[user]) {
                        const originals = merged[user][subject];
                        const variants = [];
                        originals.forEach(q => {
                            const v = generateVariants(q);
                            variants.push(...v);
                        });
                        // 原始题 + 变式题混合
                        merged[user][subject] = [...originals, ...variants];
                        // 打乱顺序
                        merged[user][subject].sort(() => Math.random() - 0.5);
                    }
                }
            }
            
            return merged;
        }
        
        let questionBank = originalQuestions;
        let currentUser = '左左';
        let currentSubject = 'physics';
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let userAnswer = null;
        let isVariantMode = false;
        
        function toggleVariantMode() {
            isVariantMode = document.getElementById('variantMode').checked;
            questionBank = getMergedQuestions();
            updateQuestionBank();
        }
        
        function switchUser(user) {
            currentUser = user;
            document.querySelectorAll('.user-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('userInfo').textContent = '当前用户：' + (user === '左左' ? '左左' : '右右');
            const bank = questionBank[currentUser];
            currentSubject = Object.keys(bank)[0];
            updateQuestionBank();
        }
        
        function updateQuestionBank() {
            const bank = questionBank[currentUser];
            let html = '';
            for (let subject in bank) {
                const count = bank[subject].length;
                const subjectName = subject === 'physics' ? '物理' : (subject === 'math' ? '数学' : '生物');
                const isChecked = subject === currentSubject ? 'checked' : '';
                html += '<div style="padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">' +
                    '<div><strong>' + subjectName + '</strong><span style="color: #666; margin-left: 8px;">' + count + ' 题' + (isVariantMode ? ' (含变式)' : '') + '</span></div>' +
                    '<label style="cursor: pointer;"><input type="radio" name="subject" value="' + subject + '" ' + isChecked + ' onchange="currentSubject=\'' + subject + '\'"><span style="margin-left: 5px;">选择</span></label></div>';
            }
            document.getElementById('questionBank').innerHTML = html;
        }
        
        function startQuiz() {
            currentQuestions = questionBank[currentUser][currentSubject];
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('startCard').classList.add('hidden');
            document.getElementById('quizCard').classList.remove('hidden');
            document.getElementById('totalNum').textContent = currentQuestions.length;
            showQuestion();
        }
        
        function showQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('currentNum').textContent = currentQuestionIndex + 1;
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('variantBadge').style.display = q.isVariant ? 'inline-block' : 'none';
            
            if (q.isFill) {
                document.getElementById('optionsContainer').innerHTML = '<input type="text" id="fillInput" class="option" style="width: 100%;" placeholder="请输入答案" oninput="userAnswer = this.value.trim(); document.getElementById(\'submitBtn\').disabled = !userAnswer;">';
                userAnswer = '';
            } else {
                const isMulti = q.answer.length > 1;
                userAnswer = isMulti ? [] : null;
                let html = '';
                q.options.forEach((opt, i) => {
                    html += '<div class="option" onclick="selectOption(' + i + ', ' + isMulti + ')">' + opt + '</div>';
                });
                document.getElementById('optionsContainer').innerHTML = html;
            }
            
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('analysisCard').classList.remove('show');
        }
        
        function selectOption(index, isMulti) {
            if (document.getElementById('analysisCard').classList.contains('show')) return;
            
            if (isMulti) {
                const idx = userAnswer.indexOf(index);
                if (idx > -1) userAnswer.splice(idx, 1); else userAnswer.push(index);
                document.querySelectorAll('.option').forEach((opt, i) => {
                    opt.classList.toggle('selected', userAnswer.includes(i));
                });
            } else {
                userAnswer = index;
                document.querySelectorAll('.option').forEach((opt, i) => {
                    opt.classList.remove('selected');
                    if (i === index) opt.classList.add('selected');
                });
            }
            document.getElementById('submitBtn').disabled = isMulti ? userAnswer.length === 0 : false;
        }
        
        function submitAnswer() {
            const q = currentQuestions[currentQuestionIndex];
            let isCorrect = false;
            
            if (q.isFill) {
                isCorrect = userAnswer === q.answer;
            } else {
                const isMulti = q.answer.length > 1;
                if (isMulti) {
                    const selected = userAnswer.map(i => String.fromCharCode(65 + i)).sort().join('');
                    const correct = q.answer.split('').sort().join('');
                    isCorrect = selected === correct;
                } else {
                    isCorrect = userAnswer === (q.answer.charCodeAt(0) - 'A'.charCodeAt(0));
                }
                
                document.querySelectorAll('.option').forEach((opt, i) => {
                    opt.classList.remove('selected');
                    const letter = String.fromCharCode(65 + i);
                    if (q.answer.includes(letter)) opt.classList.add('correct');
                    if (!q.answer.includes(letter) && ((isMulti && userAnswer.includes(i)) || (!isMulti && i === userAnswer))) opt.classList.add('wrong');
                });
            }
            
            if (isCorrect) score++;
            
            document.getElementById('analysisContent').innerHTML = q.analysis;
            document.getElementById('analysisCard').classList.add('show');
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
        }
        
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex >= currentQuestions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }
        
        function showResult() {
            document.getElementById('quizCard').classList.add('hidden');
            document.getElementById('resultCard').classList.remove('hidden');
            const accuracy = Math.round((score / currentQuestions.length) * 100);
            document.getElementById('finalScore').textContent = score + '/' + currentQuestions.length + ' (' + accuracy + '%)';
            document.getElementById('resultEmoji').textContent = accuracy >= 80 ? '🏆' : (accuracy >= 60 ? '👍' : '💪');
        }
        
        function goHome() {
            document.getElementById('resultCard').classList.add('hidden');
            document.getElementById('startCard').classList.remove('hidden');
        }
        
        // 页面加载时调用 loadQuestionBank
        loadQuestionBank();
    </script>
