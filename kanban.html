<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>错题详细看板</title>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; color: #333; line-height: 1.6; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 12px; margin-bottom: 24px; }
.header h1 { font-size: 28px; margin-bottom: 8px; }
.header .subtitle { opacity: 0.9; font-size: 14px; }
.stats { display: flex; gap: 20px; margin-top: 16px; }
.stat { background: rgba(255,255,255,0.2); padding: 12px 20px; border-radius: 8px; }
.stat-value { font-size: 24px; font-weight: 700; }
.stat-label { font-size: 12px; opacity: 0.8; }
.filters { background: white; padding: 16px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.filters select, .filters input { padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; }
.filters label { font-size: 14px; color: #666; }
.question-card { background: white; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; transition: transform 0.2s; }
.question-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.card-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
.card-header .meta { display: flex; gap: 12px; align-items: center; }
.badge { padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; }
.badge-student { background: #e6f7ff; color: #1890ff; }
.badge-subject { background: #f6ffed; color: #52c41a; }
.badge-correct { background: #f6ffed; color: #52c41a; }
.badge-wrong { background: #fff2f0; color: #ff4d4f; }
.badge-date { background: #f0f0f0; color: #666; }
.card-body { padding: 20px; }
.question-section { margin-bottom: 20px; }
.section-title { font-size: 14px; color: #8c8c8c; margin-bottom: 8px; font-weight: 500; }
.question-text { font-size: 16px; color: #1a1a1a; line-height: 1.8; }
.options { margin-top: 12px; padding-left: 20px; }
.options li { margin-bottom: 8px; font-size: 15px; }
.answer-section { background: #fafafa; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
.answer-row { display: flex; gap: 24px; }
.answer-item { flex: 1; }
.answer-label { font-size: 13px; color: #8c8c8c; margin-bottom: 4px; }
.answer-value { font-size: 16px; font-weight: 600; }
.answer-value.correct { color: #52c41a; }
.answer-value.wrong { color: #ff4d4f; }
.analysis-section { background: #fffbe6; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
.analysis-title { font-size: 14px; color: #d48806; margin-bottom: 8px; font-weight: 500; }
.analysis-content { font-size: 15px; color: #1a1a1a; line-height: 1.8; }
.knowledge-section { background: #e6f7ff; padding: 12px 16px; border-radius: 8px; }
.knowledge-title { font-size: 13px; color: #1890ff; margin-bottom: 4px; }
.knowledge-content { font-size: 14px; color: #0050b3; }
.pagination { display: flex; justify-content: center; gap: 8px; margin-top: 24px; }
.pagination button { padding: 8px 16px; border: 1px solid #d9d9d9; background: white; border-radius: 6px; cursor: pointer; }
.pagination button.active { background: #1890ff; color: white; border-color: #1890ff; }
.pagination button:hover { background: #f0f0f0; }
.no-data { text-align: center; padding: 40px; color: #8c8c8c; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🦞 左左右右错题详细看板</h1>
    <div class="subtitle">每道题完整展示：题目、答案、解析、知识点</div>
    <div class="stats">
      <div class="stat"><div class="stat-value" id="total-count">0</div><div class="stat-label">总题数</div></div>
      <div class="stat"><div class="stat-value" id="wrong-count">0</div><div class="stat-label">错题数</div></div>
      <div class="stat"><div class="stat-value" id="correct-count">0</div><div class="stat-label">正确数</div></div>
    </div>
  </div>
  
  <div class="filters">
    <label>学生：</label>
    <select id="filter-student">
      <option value="">全部</option>
      <option value="左左">左左</option>
      <option value="右右">右右</option>
    </select>
    <label>科目：</label>
    <select id="filter-subject">
      <option value="">全部</option>
    </select>
    <label>状态：</label>
    <select id="filter-status">
      <option value="">全部</option>
      <option value="wrong">错题</option>
      <option value="correct">正确</option>
    </select>
    <label>搜索：</label>
    <input type="text" id="filter-search" placeholder="关键词搜索...">
  </div>
  
  <div id="questions-container"></div>
  
  <div class="pagination" id="pagination"></div>
</div>

<script>

let currentPage = 1;
const pageSize = 10;

const questionsData = [{"student":"左左","subject":"数学","question":"某地普法小组安排 4 名男性普法员和 2 名女性普法员前往甲、乙、丙三个社区进行宣讲，每名普法员只能前往一个社区，每个社区至少有 1 名普法员，则 2 名女性普法员被安排在不同社区的方案共有____种。","answer":"390","analysis":"分步计数：①2 名女性安排到 3 个社区中的 2 个：A(3,2)=6 种；②4 名男性安排到 3 个社区，保证空的那个社区至少 1 人：C(4,1)×2³+C(4,2)×2²+C(4,3)×2¹+C(4,4)×2⁰=32+24+8+1=65 种；总计：6×65=390 种","knowledge":"排列组合、分步计数原理","date":"2026-04-25","source":"左左上传","image":"images/Q1_13排列组合+14函数极值_数学.jpg"},{"student":"左左","subject":"数学","question":"若函数 f(x) = (lnx)/x + a - 1/x² 有两个极值，则实数 a 的取值范围为____。","answer":"(2/e², +∞)","analysis":"求导 f'(x)=(1-lnx)/x²+2/x³=[x(1-lnx)+2]/x³，令 f'(x)=0 得 x(1-lnx)+2=0。设 g(x)=x-xlnx+2，g'(x)=-lnx，g(x)在(0,1)递增，(1,+∞)递减，最大值 g(1)=3。分析极值点个数得 a>2/e²","knowledge":"导数应用、函数极值、参数范围","date":"2026-04-25","source":"左左上传","image":"images/Q1_13排列组合+14函数极值_数学.jpg"},{"student":"左左","subject":"生物","question":"诱导多能干细胞 (iPSCs) 在生物医药领域有广阔的应用前景。研究人员利用多种小分子化合物协同诱导小鼠胎儿成纤维细胞，成功获得 iPSCs。相关叙述错误的是（ ）\nA. 利用胰蛋白酶处理小鼠胎儿某些组织可获得分散的成纤维细胞\nB. 小分子化合物改变了小鼠胎儿成纤维细胞的基因表达\nC. 小鼠胎儿成纤维细胞形成 iPSCs 的过程属于细胞分化","answer":"C","analysis":"A 正确：胰蛋白酶可分解细胞间质蛋白，使组织分散成单个细胞；B 正确：小分子化合物诱导细胞重编程，改变了基因表达模式；C 错误：成纤维细胞→iPSCs 是细胞重编程（去分化）过程，不是细胞分化。细胞分化是指细胞从多能状态向特定功能细胞方向发育，而 iPSCs 诱导是相反方向","knowledge":"细胞重编程、诱导多能干细胞、细胞分化与去分化","date":"2026-04-25","source":"左左上传","image":"images/Q2_iPSCs_生物.jpg"},{"student":"左左","subject":"生物","question":"三维细胞培养技术，是一种在实验室中以三维结构培养和繁殖活细胞的方法。与传统的二维细胞培养相比，三维细胞培养更接近人体内细胞的自然环境，能够更好地模拟体内细胞的生长和相互作用。下列叙述正确的是（ ）\nA. 三维细胞培养通常采用与二维相同的胰蛋白酶处理时间进行传代，以保证细胞充分分散\nB. 三维细胞的培养不存在接触抑制现象，因此三维细胞培养增长速率比二维细胞培养更快\nC. 三维细胞与培养基的接触面积更小，有利于营养物质的吸收和代谢废物的排出\nD. 三维培养中细胞更容易维持正常的形态和分化功能，常用于构建器官模型进行疾病研究","answer":"D","analysis":"A 错误：三维细胞培养由于细胞形成团块，需要更长的酶处理时间或不同的传代方法；B 错误：三维细胞培养仍然存在接触抑制，且由于营养和氧气扩散限制，增长速率通常比二维培养慢；C 错误：接触面积更小会不利于营养物质吸收和代谢废物排出，这是三维培养的劣势之一；D 正确：三维培养能更好地模拟体内环境，细胞维持正常形态和分化功能，适合构建器官模型和疾病研究","knowledge":"三维细胞培养技术、细胞培养条件、接触抑制","date":"2026-04-25","source":"左左上传","image":"images/Q4_三维细胞培养_生物.jpg"},{"student":"左左","subject":"生物","question":"关于植物细胞培养技术，下列叙述错误的是（ ）\nA. 植物细胞培养技术经历了脱分化、再分化的过程\nB. 用愈伤组织制备细胞悬液进行扩大培养\nC. 外植体用化学试剂消毒后需经无菌水冲洗才可用于接种\nD. 为诱导愈伤组织的形成，培养基中需要保持细胞分裂素多生长素少","answer":"D","analysis":"A 正确：植物组织培养核心过程是脱分化和再分化；B 正确：愈伤组织可分散成单细胞进行悬浮培养；C 正确：外植体消毒后必须用无菌水冲洗去除残留消毒剂（注意不是清水）；D 错误：诱导愈伤组织形成时，生长素和细胞分裂素比例应适中（大致相等）。细胞分裂素多促进芽分化，生长素多促进根分化","knowledge":"植物组织培养、植物激素调节、脱分化与再分化","date":"2026-04-25","source":"左左上传","image":"images/Q5_植物细胞培养A_生物.jpg"},{"student":"左左","subject":"物理","question":"点波源 S₁ 和 S₂ 分别位于 A、B 两点，形成频率相同、波长均为 0.5m 的两列波。已知 AC 中点 D 为振动减弱点，BC=3m，∠BAC=37°，BC⊥AB。则下列描述正确的是（ ）\nA. C 点为振动加强点\nB. AB 中点为振动加强点\nC. AB 连线上（不含端点）有 16 个振动减弱点\nD. AB 连线上（不含端点）有 16 个振动加强点","answer":"D","analysis":"D 到两波源等距(2.5m=5λ)却是减弱点→两波源反相。反相条件下：加强需波程差=(n+0.5)λ，减弱需=nλ。A：|CA-CB|=2m=4λ→减弱(错)；B：中点波程差=0→减弱(错)；C：减弱点Δr=nλ,n=-7~7共15个(错)；D：加强点Δr=(n+0.5)λ,n=-8~7共16个(对)","knowledge":"波的干涉、波程差、同相/反相波源","date":"2026-04-25","source":"左左上传","image":"images/Q7_波干涉_物理.jpg"},{"student":"左左","subject":"物理","question":"在盛有浅水的水槽中，t=0 时刻以相同频率拍打水面上两个点 S₁ 和 S₂ 产生两列波，两波源相距 9cm，频率为 2Hz，连线中点处有一浮标始终未振动。距 S₂ 12cm 处有一 P 点，PS₂⊥S₁S₂，经过 3s 后 P 点开始振动，下列说法中正确的是（ ）\nA. 两列波不能发生干涉\nB. t=4s 时 P 点的振动方向与 S₁ 的起振方向相同\nC. 若只改变 S₂ 的频率则浮标也有可能还是保持静止\nD. S₁P 连线上（两端点除外）共有 6 个振动减弱点","answer":"D","analysis":"O 是中点却未振动→波源反相。波速 v=12/3=4cm/s，λ=4/2=2cm。A：频率相同能干涉(错)；B：P 先到 S₂ 波，起振与 S₂ 同向(错)；C：改变频率无稳定干涉(错)；D：S₁P 线上波程差从 3 变到 -9，减弱条件Δr=nλ，n=-4~1 共 6 个(对)","knowledge":"波的干涉、波程差、同相/反相波源","date":"2026-04-25","source":"左左上传","image":"images/Q8_波干涉水槽_物理.jpg"}];
updateStats();
populateFilters();
renderQuestions();

function updateStats() {
  const total = questionsData.length;
  const wrong = questionsData.filter(q => isWrong(q)).length;
  const correct = total - wrong;
  document.getElementById('total-count').textContent = total;
  document.getElementById('wrong-count').textContent = wrong;
  document.getElementById('correct-count').textContent = correct;
}

function isWrong(q) {
  const answer = q.answer || '';
  const question = q.question || '';
  // 检查题目中是否有 ❌ 标记
  if (question.includes('❌')) return true;
  if (question.includes('✅')) return false;
  // 检查答案中是否有 ❌ 标记
  if (answer.includes('❌')) return true;
  return false;
}

function populateFilters() {
  const subjects = [...new Set(questionsData.map(q => q.subject))].filter(s => s);
  const select = document.getElementById('filter-subject');
  subjects.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    select.appendChild(opt);
  });
}

function getFilteredQuestions() {
  const student = document.getElementById('filter-student').value;
  const subject = document.getElementById('filter-subject').value;
  const status = document.getElementById('filter-status').value;
  const search = document.getElementById('filter-search').value.toLowerCase();
  
  return questionsData.filter(q => {
    if (student && q.student !== student) return false;
    if (subject && q.subject !== subject) return false;
    if (status === 'wrong' && !isWrong(q)) return false;
    if (status === 'correct' && isWrong(q)) return false;
    if (search && !JSON.stringify(q).toLowerCase().includes(search)) return false;
    return true;
  });
}

function renderQuestions() {
  const filtered = getFilteredQuestions();
  const totalPages = Math.ceil(filtered.length / pageSize);
  const start = (currentPage - 1) * pageSize;
  const pageData = filtered.slice(start, start + pageSize);
  
  const container = document.getElementById('questions-container');
  
  if (pageData.length === 0) {
    container.innerHTML = '<div class="no-data">没有找到符合条件的题目</div>';
    return;
  }
  
  container.innerHTML = pageData.map((q, i) => {
    const wrong = isWrong(q);
    const statusBadge = wrong 
      ? '<span class="badge badge-wrong">❌ 错题</span>'
      : '<span class="badge badge-correct">✅ 正确</span>';
    
    return `
      <div class="question-card">
        <div class="card-header">
          <div class="meta">
            <span class="badge badge-student">${q.student || '未知'}</span>
            <span class="badge badge-subject">${q.subject || '未知'}</span>
            ${statusBadge}
            <span class="badge badge-date">${q.date || '未知日期'}</span>
          </div>
          <div style="font-size:14px;color:#8c8c8c;">第 ${start + i + 1} 题 · 来源：${q.source || '未知'}</div>
        </div>
        <div class="card-body">
          <div class="question-section">
            <div class="section-title">📝 题目</div>
            <div class="question-text">${formatContent(q.question)}${q.image ? `<br><img src="${q.image}" style="max-width:100%;border-radius:8px;margin-top:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);" alt="题目原图">` : ""}</div>
          </div>
          
          <div class="answer-section">
            <div class="answer-row">
              <div class="answer-item">
                <div class="answer-label">正确答案</div>
                <div class="answer-value correct">${formatContent(q.answer || '无')}</div>
              </div>
              <div class="answer-item">
                <div class="answer-label">知识点</div>
                <div class="answer-value">${formatContent(q.knowledge || '未知')}</div>
              </div>
            </div>
          </div>
          
          <div class="analysis-section">
            <div class="analysis-title">💡 解析</div>
            <div class="analysis-content">${formatContent(q.analysis || '暂无解析')}</div>
          </div>
          
          ${q.knowledge ? `
          <div class="knowledge-section">
            <div class="knowledge-title">📚 知识点</div>
            <div class="knowledge-content">${formatContent(q.knowledge)}</div>
          </div>
          ` : ''}
        </div>
      </div>
    `;
  }).join('');
  
  // 渲染分页
  renderPagination(totalPages);
  
  // 渲染数学公式
  if (window.MathJax) {
    MathJax.typesetPromise();
  }
}

function formatContent(text) {
  if (!text) return '';
  // 将换行符转为 HTML
  return text.replace(/\n/g, '<br>');
}

function renderPagination(totalPages) {
  const pagination = document.getElementById('pagination');
  if (totalPages <= 1) {
    pagination.innerHTML = '';
    return;
  }
  
  let html = '';
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
  }
  pagination.innerHTML = html;
}

function goToPage(page) {
  currentPage = page;
  renderQuestions();
}

// 监听筛选变化
document.getElementById('filter-student').addEventListener('change', () => { currentPage = 1; renderQuestions(); });
document.getElementById('filter-subject').addEventListener('change', () => { currentPage = 1; renderQuestions(); });
document.getElementById('filter-status').addEventListener('change', () => { currentPage = 1; renderQuestions(); });
document.getElementById('filter-search').addEventListener('input', () => { currentPage = 1; renderQuestions(); });
</script>
</body>
</html>
