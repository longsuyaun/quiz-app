<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦐 学习虾错题自测 - 完整版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header h1 { font-size: 24px; color: #333; text-align: center; margin-bottom: 15px; }
        .user-selector { display: flex; gap: 10px; }
        .user-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .user-btn.active { background: #667eea; color: white; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            margin: 10px 0;
            cursor: pointer;
            font-size: 16px;
        }
        .option:hover { border-color: #667eea; background: #f5f5ff; }
        .option.selected { border-color: #667eea; background: #667eea; color: white; }
        .option.correct { border-color: #4CAF50; background: #4CAF50; color: white; }
        .option.wrong { border-color: #f44336; background: #f44336; color: white; }
        .question-text { font-size: 18px; line-height: 1.8; color: #333; margin-bottom: 20px; }
        .analysis {
            display: none;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
        }
        .analysis.show { display: block; }
        .hidden { display: none; }
        .variant-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-left: 10px;
        }
        .variant-toggle {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }
        .variant-toggle label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #555;
        }
        .variant-toggle input { width: 18px; height: 18px; cursor: pointer; }
        .hint { font-size: 14px; color: #666; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦐 学习虾错题自测</h1>
            <div class="user-selector">
                <button class="user-btn active" onclick="switchUser('zuozuo')">👤 左左</button>
                <button class="user-btn" onclick="switchUser('youyou')">👤 右右</button>
            </div>
        </div>
        
        <div id="startCard" class="card">
            <h2 style="margin-bottom: 15px;">📚 准备开始</h2>
            <p id="userInfo" style="color: #666; margin-bottom: 20px;">当前用户：左左</p>
            
            <div class="variant-toggle">
                <label>
                    <input type="checkbox" id="variantMode" onchange="toggleVariantMode()">
                    🔄 启用变式题模式（举一反三）
                </label>
                <p class="hint">💡 启用后会生成类似题目，帮助真正掌握知识点</p>
            </div>
            
            <div style="background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                <h3 style="margin-bottom: 10px;">📊 可用题库</h3>
                <div id="questionBank"></div>
            </div>
            <button class="btn" onclick="startQuiz()">开始自测</button>
        </div>
        
        <div id="quizCard" class="card hidden">
            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; display: inline-block; margin-bottom: 15px;">
                第 <span id="currentNum">1</span> / <span id="totalNum">10</span> 题
                <span id="variantBadge" class="variant-badge" style="display: none;">🔄 变式题</span>
            </div>
            <div class="question-text" id="questionText">题目加载中...</div>
            <div id="optionsContainer"></div>
            <button class="btn" id="submitBtn" onclick="submitAnswer()" disabled>提交答案</button>
            <div class="analysis" id="analysisCard">
                <h3 style="color: #667eea; margin-bottom: 10px;">📖 详细解析</h3>
                <div id="analysisContent"></div>
            </div>
            <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display: none;">下一题</button>
        </div>
        
        <div id="resultCard" class="card hidden" style="text-align: center;">
            <div style="font-size: 60px; margin: 20px 0;" id="resultEmoji">🎉</div>
            <h2>测试完成！</h2>
            <div style="font-size: 48px; font-weight: bold; color: #667eea; margin: 20px 0;" id="finalScore">100 分</div>
            <button class="btn" onclick="goHome()">返回首页</button>
        </div>
    </div>

    <script>
        // 原始题库
        const originalQuestions = {
            zuozuo: {
                physics: [
                    { id: 1, question: "关于单摆的运动，下列说法正确的是（ ）", options: ["A. 回复力是重力和拉力的合力", "B. 同一位置速度相同", "C. 加速度总指向平衡位置", "D. 平衡位置加速度为零"], answer: "D", analysis: "<p><strong>A 错误</strong>：回复力只是重力的切向分力。</p><p><strong>B 错误</strong>：速度是矢量，方向会变化。</p><p><strong>C 错误</strong>：加速度有切向和法向分量。</p><p><strong>D 正确</strong>：平衡位置回复力为零。</p>" },
                    { id: 2, question: "（多选）单摆（θ<5°）周期为 T，下列说法正确的是（ ）", options: ["A. 质量增加周期变小", "B. 摆角变小周期变小", "C. T = 2π√(l/g)", "D. T=1.2s 时 l≈0.36m"], answer: "CD", analysis: "<p><strong>A 错误</strong>：周期与质量无关。</p><p><strong>B 错误</strong>：小角度下周期与摆角无关。</p><p><strong>C 正确</strong>：单摆周期公式。</p><p><strong>D 正确</strong>：l = gT²/(4π²) ≈ 0.36m。</p>" },
                    { id: 3, question: "DIS 实验中，t=0.2s 时拉力最大，说明摆球在（ ）", options: ["A. 最高点", "B. 最低点", "C. 中间位置", "D. 无法判断"], answer: "B", analysis: "<p>拉力最大时在最低点，因为 F = mg + mv²/l，速度最大时需要向心力最大。</p>" }
                ],
                biology: [
                    { id: 4, question: "利用四种试剂对 6 个细胞染色，相邻不同色，甲试剂不能染 C，共有多少种方法？", options: ["填空题"], answer: "90", isFill: true, analysis: "<p>A、C、D 两两相邻→必须用 3 种不同颜色</p><p>C 不能用甲→C 有 3 种选择</p><p>总计：18 × 5 = 90 种</p>" }
                ]
            },
            youyou: {
                math: [
                    { id: 5, question: "若 A_n³ = 12C_n²，则 n = ?", options: ["A. 6", "B. 7", "C. 8", "D. 9"], answer: "C", analysis: "<p>A_n³ = n(n-1)(n-2)</p><p>12C_n² = 6n(n-1)</p><p>n-2 = 6 → n = 8</p>" },
                    { id: 6, question: "已知 C_{n+1}⁷ - C_n⁷ = C_n⁸，则 n 等于？", options: ["A. 12", "B. 13", "C. 14", "D. 15"], answer: "C", analysis: "<p>移项：C_{n+1}⁷ = C_n⁷ + C_n⁸</p><p>用递推公式得 C_{n+1}⁷ = C_{n+1}⁸</p><p>由对称性：7 + 8 = n + 1 → n = 14</p>" },
                    { id: 7, question: "从 5 名男生、3 名女生中选 4 人，至少有 1 名女生的选法有多少种？", options: ["A. 55 种", "B. 60 种", "C. 65 种", "D. 70 种"], answer: "C", analysis: "<p>逆向排除法：</p><p>总选法：C_8⁴ = 70</p><p>全是男生：C_5⁴ = 5</p><p>至少 1 女生：70 - 5 = 65 种</p>" },
                    // 二项分布专题 - 2026-04-06
                    { id: 101, question: "已知随机变量 X 服从二项分布 B(6, 1/3)，则 P(X=2) = ?", options: ["A. 3/16", "B. 4/243", "C. 13/243", "D. 80/243"], answer: "D", analysis: "<p>P(X=2) = C₆² × (1/3)² × (2/3)⁴ = 15 × 1/9 × 16/81 = 80/243</p>" },
                    { id: 102, question: "某学生通过英语听力测试的概率为 1/3，连续测试 3 次，恰有 1 次通过的概率是？", options: ["A. 4/9", "B. 2/9", "C. 4/27", "D. 2/27"], answer: "A", analysis: "<p>P(X=1) = C₃¹ × (1/3)¹ × (2/3)² = 3 × 1/3 × 4/9 = 4/9</p>" },
                    { id: 103, question: "5 粒种子，每粒发芽概率 98%，恰有 4 粒发芽的概率是？", options: ["A. (0.98)⁴×0.02", "B. 0.98×(0.2)⁴", "C. C₅⁴×(0.98)⁴×0.02", "D. C₅⁴×0.98×(0.02)⁴"], answer: "C", analysis: "<p>P(X=4) = C₅⁴ × (0.98)⁴ × (0.02)¹</p>" },
                    { id: 104, question: "硬币抛掷 5 次，k 次正面概率等于 k+1 次正面概率，则 k = ?", options: ["A. 0", "B. 1", "C. 2", "D. 3"], answer: "C", analysis: "<p>C₅ᵏ = C₅ᵏ⁺¹ → k+1 = 5-k → k = 2</p>" },
                    { id: 105, question: "袋中 5 白 3 红球，有放回取球直到红球出现 10 次停止，P(X=12) = ?", options: ["A. C₁₁⁹×(3/8)¹⁰×(5/8)²", "B. C₁₁⁹×(3/8)⁹×(5/8)²×3/8", "C. C₁₁⁹×(5/8)⁹×(3/8)²×5/8", "D. C₁₁⁹×(5/8)²×(3/8)¹⁰"], answer: "B", analysis: "<p>前 11 次恰 9 次红球：C₁₁⁹×(3/8)⁹×(5/8)²</p><p>第 12 次必须是红球：×3/8</p>" },
                    { id: 106, question: "（多选）3 白球 m 黑球，有放回摸 5 次，E(X)=3，则？", options: ["A. D(X)=8/5", "B. D(X)=6/5", "C. m=2", "D. m=3"], answer: "BC", analysis: "<p>X~B(5,p)，p=3/(3+m)</p><p>E(X)=5p=3 → p=3/5 → m=2</p><p>D(X)=5×3/5×2/5=6/5</p>" },
                    { id: 107, question: "（多选）射击 4 次至少命中 1 次概率 80/81，则？", options: ["A. X~B(4,p)", "B. P(X≥1)=80/81", "C. p=2/3 或 4/3", "D. p=2/3"], answer: "ABD", analysis: "<p>1-(1-p)⁴=80/81 → (1-p)⁴=1/81 → p=2/3</p><p>C 错：概率不能>1</p>" },
                    { id: 108, question: "硬币抛 6 次，正面比反面多的概率？", options: ["填空题"], answer: "11/32", isFill: true, analysis: "<p>P(X>3)=P(4)+P(5)+P(6)</p><p>=(15+6+1)/64=22/64=11/32</p>" },
                    { id: 109, question: "等差数列{aₙ}中 a₄=2,a₇=-4，前 10 项有放回取 3 次，2 次非负 1 次负的概率？", options: ["填空题"], answer: "3/8", isFill: true, analysis: "<p>aₙ=10-2n，前 10 项中 5 个非负 5 个负</p><p>P=C₃²×(1/2)²×(1/2)=3/8</p>" }
                ],
                physics: [
                    // 机械波专题 - 2026-04-06
                    { id: 201, question: "（多选）关于波线波面，正确的是？", options: ["A. 只有平面波的波面才与波线垂直", "B. 任何波的波线与波面都相互垂直", "C. 任何波的波线都表示波的传播方向", "D. 有些波的波面表示波的传播方向"], answer: "BC", analysis: "<p>A 错：任何波的波面都与波线垂直</p><p>D 错：波面是等相位面</p>" },
                    { id: 202, question: "关于波的折射，正确的是？", options: ["A. 入射角与折射角的比等于两波速比", "B. 入射波波长小于折射波波长", "C. 入射波波长大于折射波波长", "D. 入射波波长等于反射波波长"], answer: "D", analysis: "<p>A 错：是正弦比等于波速比</p><p>B/C 无法确定</p><p>D 对：反射波与入射波在同一介质</p>" },
                    { id: 203, question: "（多选）关于波的应用，正确的是？", options: ["A. 潜艇声呐用波的反射", "B. 隐形飞机减少波的反射", "C. 超声波雷达用波的折射", "D. 水波从深水到浅水是折射"], answer: "ABD", analysis: "<p>C 错：超声波雷达用反射原理</p>" },
                    { id: 204, question: "甲乙相距 2a，距墙均为√3a，甲开枪后乙 t 秒听到第一声，第二声何时听到？", options: ["A. 听不到", "B. 3t 后", "C. 2t 后", "D. (√3+√7)t/2 后"], answer: "C", analysis: "<p>第一声：2a/v=t</p><p>第二声（反射）：路程 4a，时间 4a/v=2t</p>" },
                    { id: 205, question: "声波在介质Ⅰ中波长 0.2m，传入介质Ⅱ后波长 0.6m，介质Ⅰ中声速 340m/s。介质Ⅱ中波速？", options: ["A. 340m/s", "B. 680m/s", "C. 1020m/s", "D. 1700m/s"], answer: "C", analysis: "<p>f=v₁/λ₁=340/0.2=1700Hz</p><p>v₂=λ₂f=0.6×1700=1020m/s</p>" }
                ],
                chemistry: [
                    // 分子结构与极性专题 - 2026-03-31
                    { id: 301, question: "下列物质中存在四面体结构的是？①白磷 ②金刚石 ③石墨 ④晶体硅 ⑤甲烷 ⑥CCl₄ ⑦单晶硅 ⑧NH₄⁺", options: ["A. ①②④⑤⑥⑦", "B. 除③外都有", "C. ①②③④⑤", "D. ⑤⑥⑧"], answer: "B", analysis: "<p>③石墨是层状结构（sp²杂化）</p><p>其余都是 sp³杂化四面体结构</p>" },
                    { id: 302, question: "关于 SiS₂链状结构，不正确的是？", options: ["A. SiS₂为共价晶体", "B. SiS₂可水解生成 H₂S", "C. SiS₂熔沸点比 CS₂高", "D. 92g SiS₂含 4mol 共价键"], answer: "A", analysis: "<p>A 错：SiS₂是链状结构，不是空间网状共价晶体</p><p>D 对：92g=1mol，每个 Si 连 4 个 S</p>" },
                    { id: 303, question: "含有手性碳原子的是？", options: ["A. CH₂F₂", "B. CH₃CH(OH)COOH", "C. CH₃CH₂OH", "D. 葡萄糖"], answer: "B", analysis: "<p>手性碳：连 4 个不同基团</p><p>B 中间 C 连 H、OH、CH₃、COOH</p>" },
                    { id: 304, question: "下列说法正确的是？", options: ["A. 极性键构成的分子都是极性分子", "B. 含非极性键的分子不一定是非极性分子", "C. 非极性分子一定含非极性键", "D. 离子化合物不可能含非极性键"], answer: "B", analysis: "<p>A 错：CH₄有极性键但非极性</p><p>B 对：H₂O₂有 O-O 非极性键但是极性分子</p><p>C 错：CH₄只有极性键</p><p>D 错：Na₂O₂含 O-O 非极性键</p>" },
                    { id: 305, question: "静电玻璃棒接近液体细流，会偏移的是？", options: ["A. CCl₄", "B. C₂H₅OH", "C. CS₂", "D. C₆H₆"], answer: "B", analysis: "<p>极性分子才会偏转</p><p>乙醇是极性分子，其余是非极性</p>" },
                    { id: 306, question: "氧原子基态未成对电子数？", options: ["A. 1", "B. 2", "C. 3", "D. 4"], answer: "B", analysis: "<p>O: 1s²2s²2p⁴</p><p>2p 轨道：↑↓ ↑ ↑，未成对 2 个</p>" },
                    { id: 307, question: "H₂O 分子内 O-H 键、分子间氢键、范德华力从强到弱？", options: ["A. 氢键>O-H 键>范德华力", "B. O-H 键>氢键>范德华力", "C. 范德华力>氢键>O-H 键", "D. O-H 键>范德华力>氢键"], answer: "B", analysis: "<p>共价键 (~460kJ/mol) > 氢键 (~20kJ/mol) > 范德华力 (~5kJ/mol)</p>" },
                    { id: 308, question: "对羟基苯甲醛熔点 115℃，邻羟基苯甲醛 -7℃，原因是？", options: ["A. 对位形成分子间氢键", "B. 邻位形成分子间氢键", "C. 对位形成分子内氢键", "D. 两者都形成分子内氢键"], answer: "A", analysis: "<p>对位：分子间氢键→分子间作用力大→熔点高</p><p>邻位：分子内氢键→不影响分子间作用力→熔点低</p>" },
                    { id: 309, question: "H₃O⁺中 O 原子杂化类型及 H-O-H 键角比 H₂O 大的原因？", options: ["A. sp²，孤电子对少", "B. sp³，孤电子对少", "C. sp³，孤电子对多", "D. sp，斥力小"], answer: "B", analysis: "<p>H₃O⁺：sp³杂化，1 对孤电子对</p><p>H₂O：sp³杂化，2 对孤电子对</p><p>孤电子对越少，斥力越小，键角越大</p>" }
                ],
                biology: [
                    // 发酵工程专题 - 2026-03-09 桂圆果酒
                    { id: 401, question: "桂圆果酒发酵中，清洗环节的正确操作顺序是？", options: ["A. 先去皮去核再清洗", "B. 先清洗后去皮去核", "C. 同时进行", "D. 无需清洗"], answer: "B", analysis: "<p>先清洗表面污物，再处理内部</p><p>防止清洗时果肉被污染</p><p>口诀：先外后内，先洗后切</p>" },
                    { id: 402, question: "果胶酶的作用是？", options: ["A. 分解果胶产生葡萄糖", "B. 分解细胞壁增加出汁率", "C. 催化酒精发酵", "D. 抑制杂菌生长"], answer: "B", analysis: "<p>果胶酶分解细胞壁和胞间层</p><p>增加出汁率和澄清度，不产生单糖</p><p>口诀：果胶酶破壁不出糖</p>" },
                    { id: 403, question: "选择酵母菌株应主要看？", options: ["A. 感官评分最高", "B. 酒精度和发酵能力", "C. 颜色最好看", "D. 价格最低"], answer: "B", analysis: "<p>Y1 酒精度最高，发酵能力强</p><p>Y5 感官评分高但酒精度太低</p><p>口诀：选酵母，看发酵，酒精度是硬指标</p>" },
                    { id: 404, question: "发酵后期速率下降的原因？（多选）", options: ["A. 营养物质消耗", "B. 酒精抑制酵母生长", "C. 温度过高", "D. pH 变化"], answer: "AB", analysis: "<p>两大限制因素：</p><p>1. 营养限制（底物消耗）</p><p>2. 产物抑制（酒精毒性）</p><p>口诀：营养耗尽产物抑</p>" }
                ]
            }
        };
        
        // 变式题生成器
        function generateVariants(original) {
            const variants = [];
            
            // 数字变式
            if (original.question.includes("12")) {
                const variant = JSON.parse(JSON.stringify(original));
                variant.question = original.question.replace("12", "20");
                variant.answer = original.answer === "C" ? "C" : original.answer;
                variant.isVariant = true;
                variants.push(variant);
            }
            
            // 问法变式
            if (original.question.includes("正确的是")) {
                const variant = JSON.parse(JSON.stringify(original));
                variant.question = original.question.replace("正确的是", "错误的是");
                variant.isVariant = true;
                variants.push(variant);
            }
            
            return variants;
        }
        
        // 合并题库（原始 + 变式）
        function getMergedQuestions() {
            const merged = JSON.parse(JSON.stringify(originalQuestions));
            
            if (isVariantMode) {
                for (let user in merged) {
                    for (let subject in merged[user]) {
                        const originals = merged[user][subject];
                        const variants = [];
                        originals.forEach(q => {
                            const v = generateVariants(q);
                            variants.push(...v);
                        });
                        // 原始题 + 变式题混合
                        merged[user][subject] = [...originals, ...variants];
                        // 打乱顺序
                        merged[user][subject].sort(() => Math.random() - 0.5);
                    }
                }
            }
            
            return merged;
        }
        
        let questionBank = originalQuestions;
        let currentUser = 'zuozuo';
        let currentSubject = 'physics';
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let userAnswer = null;
        let isVariantMode = false;
        
        function toggleVariantMode() {
            isVariantMode = document.getElementById('variantMode').checked;
            questionBank = getMergedQuestions();
            updateQuestionBank();
        }
        
        function switchUser(user) {
            currentUser = user;
            document.querySelectorAll('.user-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('userInfo').textContent = '当前用户：' + (user === 'zuozuo' ? '左左' : '右右');
            const bank = questionBank[currentUser];
            currentSubject = Object.keys(bank)[0];
            updateQuestionBank();
        }
        
        function updateQuestionBank() {
            const bank = questionBank[currentUser];
            let html = '';
            for (let subject in bank) {
                const count = bank[subject].length;
                const subjectName = subject === 'physics' ? '物理' : (subject === 'math' ? '数学' : (subject === 'chemistry' ? '化学' : '生物'));
                const isChecked = subject === currentSubject ? 'checked' : '';
                html += '<div style="padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">' +
                    '<div><strong>' + subjectName + '</strong><span style="color: #666; margin-left: 8px;">' + count + ' 题' + (isVariantMode ? ' (含变式)' : '') + '</span></div>' +
                    '<label style="cursor: pointer;"><input type="radio" name="subject" value="' + subject + '" ' + isChecked + ' onchange="currentSubject=\'' + subject + '\'"><span style="margin-left: 5px;">选择</span></label></div>';
            }
            document.getElementById('questionBank').innerHTML = html;
        }
        
        function startQuiz() {
            currentQuestions = questionBank[currentUser][currentSubject];
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('startCard').classList.add('hidden');
            document.getElementById('quizCard').classList.remove('hidden');
            document.getElementById('totalNum').textContent = currentQuestions.length;
            showQuestion();
        }
        
        function showQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('currentNum').textContent = currentQuestionIndex + 1;
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('variantBadge').style.display = q.isVariant ? 'inline-block' : 'none';
            
            if (q.isFill) {
                document.getElementById('optionsContainer').innerHTML = '<input type="text" id="fillInput" class="option" style="width: 100%;" placeholder="请输入答案" oninput="userAnswer = this.value.trim(); document.getElementById(\'submitBtn\').disabled = !userAnswer;">';
                userAnswer = '';
            } else {
                const isMulti = q.answer.length > 1;
                userAnswer = isMulti ? [] : null;
                let html = '';
                q.options.forEach((opt, i) => {
                    html += '<div class="option" onclick="selectOption(' + i + ')">' + opt + '</div>';
                });
                document.getElementById('optionsContainer').innerHTML = html;
            }
            
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('analysisCard').classList.remove('show');
        }
        
        function selectOption(index) {
            if (document.getElementById('analysisCard').classList.contains('show')) return;
            
            const q = currentQuestions[currentQuestionIndex];
            const isMulti = q.answer.length > 1;
            
            if (isMulti) {
                const idx = userAnswer.indexOf(index);
                if (idx > -1) userAnswer.splice(idx, 1); else userAnswer.push(index);
                document.querySelectorAll('.option').forEach((opt, i) => {
                    opt.classList.toggle('selected', userAnswer.includes(i));
                });
            } else {
                userAnswer = index;
                document.querySelectorAll('.option').forEach((opt, i) => {
                    opt.classList.remove('selected');
                    if (i === index) opt.classList.add('selected');
                });
            }
            document.getElementById('submitBtn').disabled = isMulti ? userAnswer.length === 0 : false;
        }
        
        function submitAnswer() {
            const q = currentQuestions[currentQuestionIndex];
            let isCorrect = false;
            
            if (q.isFill) {
                isCorrect = userAnswer === q.answer;
            } else {
                const isMulti = q.answer.length > 1;
                if (isMulti) {
                    const selected = userAnswer.map(i => String.fromCharCode(65 + i)).sort().join('');
                    const correct = q.answer.split('').sort().join('');
                    isCorrect = selected === correct;
                } else {
                    isCorrect = userAnswer === (q.answer.charCodeAt(0) - 'A'.charCodeAt(0));
                }
                
                document.querySelectorAll('.option').forEach((opt, i) => {
                    opt.classList.remove('selected');
                    const letter = String.fromCharCode(65 + i);
                    if (q.answer.includes(letter)) opt.classList.add('correct');
                    if (!q.answer.includes(letter) && ((isMulti && userAnswer.includes(i)) || (!isMulti && i === userAnswer))) opt.classList.add('wrong');
                });
            }
            
            if (isCorrect) score++;
            
            document.getElementById('analysisContent').innerHTML = q.analysis;
            document.getElementById('analysisCard').classList.add('show');
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
        }
        
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex >= currentQuestions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }
        
        function showResult() {
            document.getElementById('quizCard').classList.add('hidden');
            document.getElementById('resultCard').classList.remove('hidden');
            const accuracy = Math.round((score / currentQuestions.length) * 100);
            document.getElementById('finalScore').textContent = score + '/' + currentQuestions.length + ' (' + accuracy + '%)';
            document.getElementById('resultEmoji').textContent = accuracy >= 80 ? '🏆' : (accuracy >= 60 ? '👍' : '💪');
        }
        
        function goHome() {
            document.getElementById('resultCard').classList.add('hidden');
            document.getElementById('startCard').classList.remove('hidden');
        }
        
        updateQuestionBank();
    </script>
</body>
</html>
